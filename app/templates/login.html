<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f6f7fb;
    }
    .card {
      max-width: 420px;
      margin: 80px auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      padding: 24px;
    }
    h1 {
      margin-top: 0;
    }
    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .hint {
      color: #555;
      font-size: 14px;
      margin-top: 10px;
    }
    .error {
      margin-top: 10px;
      color: #b91c1c;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Login</h1>
    <p>Demo account: <strong>admin / secret123</strong></p>

    {% if error %}
      <p id="error" class="error">{{ error }}</p>
    {% endif %}

    <form method="post" action="/login">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" value="{{ username }}" />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" />

      <button type="submit">Login</button>
    </form>

    <p class="hint">Use this demo to show logic, API, and UI testing in one project.</p>
  </div>
</body>
</html>
